name: Build macOS App

# Запускать сборку при каждом обновлении кода в главной ветке
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # Используем последнюю версию macOS от GitHub
    runs-on: macos-latest

    steps:
    # 1. Скачиваем твой код из репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python 3.12
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Устанавливаем Kivy и PyInstaller
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Запускаем сборку .app файла
    - name: Build with PyInstaller
      run: |
        # --windowed убирает консоль, --name задает имя приложения
        pyinstaller --windowed --name "ClickerApp" main.py

    # 5. Упаковываем результат в архив, чтобы можно было скачать
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClickerApp-macOS
        path: dist/ClickerApp.app
